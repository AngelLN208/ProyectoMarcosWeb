<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Aviva — Panel Principal</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏥</text></svg>">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <link rel="stylesheet" href="../../css/stilos.css"/>

</head>
<body data-tema="claro">
<div id="wrapper">

  <!-- SIDEBAR generado por funciones.js -->
  <aside class="sidebar shadow-sm" id="sidebar-wrapper"></aside>

  <!-- CONTENIDO PRINCIPAL -->
  <main id="page-content-wrapper" class="fondo-claro-personalizado">

    <!-- NAVBAR generado por funciones.js -->
    <div id="navbar-wrapper"></div>

    <!-- CONTENIDO -->
    <div class="container-fluid px-4 pb-4">
      <div class="panel-titulo d-flex align-items-center gap-2 mb-4 mt-2">
        <i class="fa-solid fa-border-all texto-primario-personalizado fa-lg"></i>
        <h4 class="fw-bold mb-0">Panel Principal</h4>
      </div>

      <!-- TARJETAS ESTADÍSTICAS -->
      <div class="grid-estadisticas">
        <div class="card tarjeta-estadistica border-0 rounded-4 p-3 shadow-sm">
          <div class="card-body">
            <div class="d-flex justify-content-between align-items-center mb-2">
              <h6 class="text-muted mb-0"><i class="fa-solid fa-users me-2"></i> Pacientes Registrados</h6>
            </div>
            <h2 class="fw-bold mb-0" id="stat-pacientes-registrados">0</h2>
            <small class="text-muted" id="stat-pacientes-registrados-sub">Cargando...</small>
          </div>
        </div>
        <div class="card tarjeta-estadistica border-0 rounded-4 p-3 shadow-sm">
          <div class="card-body">
            <div class="d-flex justify-content-between align-items-center mb-2">
              <h6 class="text-muted mb-0"><i class="fa-solid fa-calendar-check me-2"></i> Citas Realizadas Hoy</h6>
            </div>
            <h2 class="fw-bold mb-0" id="stat-citas-realizadas">0</h2>
            <small class="text-muted" id="stat-citas-realizadas-sub">Cargando...</small>
          </div>
        </div>
        <div class="card tarjeta-estadistica border-0 rounded-4 p-3 shadow-sm">
          <div class="card-body">
            <div class="d-flex justify-content-between align-items-center mb-2">
              <h6 class="text-muted mb-0"><i class="fa-solid fa-clock me-2"></i> Citas Pendientes Hoy</h6>
              <span class="badge fondo-info-sutil texto-info rounded-pill px-2 py-1">Pendientes</span>
            </div>
            <h2 class="fw-bold mb-0" id="stat-citas-pendientes">0</h2>
            <small class="text-muted" id="stat-citas-pendientes-sub">Cargando...</small>
          </div>
        </div>
      </div>

      <!-- ACCESOS RÁPIDOS -->
      <div class="row g-3 mb-4">
        <div class="col-6 col-md-3">
          <a href="citas.html" class="card border-0 rounded-4 shadow-sm p-3 text-decoration-none acceso-rapido d-flex flex-column align-items-center justify-content-center text-center">
            <div class="acceso-icon mb-2"><i class="fa-regular fa-calendar-check fa-2x texto-primario-personalizado"></i></div>
            <span class="fw-semibold" style="font-size:0.9rem;color:var(--texto-oscuro)">Gestión de Citas</span>
          </a>
        </div>
        <div class="col-6 col-md-3">
          <a href="pacientes.html" class="card border-0 rounded-4 shadow-sm p-3 text-decoration-none acceso-rapido d-flex flex-column align-items-center justify-content-center text-center">
            <div class="acceso-icon mb-2"><i class="fa-solid fa-bed-pulse fa-2x texto-primario-personalizado"></i></div>
            <span class="fw-semibold" style="font-size:0.9rem;color:var(--texto-oscuro)">Pacientes</span>
          </a>
        </div>
        <div class="col-6 col-md-3">
          <a href="horarioMedicos.html" class="card border-0 rounded-4 shadow-sm p-3 text-decoration-none acceso-rapido d-flex flex-column align-items-center justify-content-center text-center">
            <div class="acceso-icon mb-2"><i class="fa-solid fa-stethoscope fa-2x texto-primario-personalizado"></i></div>
            <span class="fw-semibold" style="font-size:0.9rem;color:var(--texto-oscuro)">Horario Médicos</span>
          </a>
        </div>
        <div class="col-6 col-md-3">
          <a href="pagos.html" class="card border-0 rounded-4 shadow-sm p-3 text-decoration-none acceso-rapido d-flex flex-column align-items-center justify-content-center text-center">
            <div class="acceso-icon mb-2"><i class="fa-solid fa-money-bill-wave fa-2x texto-primario-personalizado"></i></div>
            <span class="fw-semibold" style="font-size:0.9rem;color:var(--texto-oscuro)">Pagos</span>
          </a>
        </div>
      </div>

      <!-- TABLA PRÓXIMAS CITAS -->
      <div class="card border-0 rounded-4 shadow-sm p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <h5 class="fw-bold mb-0">Próximas Citas (Hoy)</h5>
          <a href="citas.html" class="text-muted text-decoration-none small">Ver todas →</a>
        </div>
        <div class="table-responsive">
          <table class="table table-borderless align-middle tabla-personalizada m-0">
            <thead class="border-bottom">
              <tr><th>Hora</th><th>Paciente</th><th>Especialidad</th><th>Médico</th><th>Estado</th></tr>
            </thead>
            <tbody id="tbody-citas-hoy">
              <tr><td colspan="5" class="text-center text-muted py-4">Cargando citas...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../../js/funciones.js"></script>
<script src="../../js/app.recepcion.js"></script>
</body>
</html>
