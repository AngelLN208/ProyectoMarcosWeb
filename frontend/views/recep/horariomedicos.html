<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Aviva — Horario Médicos</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏥</text></svg>">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <link rel="stylesheet" href="../../css/stilos.css"/>
</head>
<body data-tema="claro">
<div id="wrapper">

  <!-- SIDEBAR generado por funciones.js -->
  <aside class="sidebar shadow-sm" id="sidebar-wrapper"></aside>

  <main id="page-content-wrapper" class="fondo-claro-personalizado">

    <!-- NAVBAR generado por funciones.js -->
    <div id="navbar-wrapper"></div>

    <div class="container-fluid px-4 pb-4">
      <div class="panel-titulo d-flex align-items-center gap-2 mb-4 mt-2">
        <i class="fa-solid fa-stethoscope texto-primario-personalizado fa-lg"></i>
        <h4 class="fw-bold mb-0">Horario de Médicos</h4>
      </div>

      <div class="card border-0 rounded-4 shadow-sm p-4">
        <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
          <h5 class="fw-bold mb-0">Agenda Médica</h5>
        </div>

        <!-- FILTROS -->
        <div class="row g-2 mb-3">
          <div class="col-12 col-md-5">
            <div class="input-group barra-busqueda rounded-pill overflow-hidden">
              <span class="input-group-text bg-white border-0 text-muted ps-3"><i class="fa-solid fa-search"></i></span>
              <input type="text" id="filtro-nombre" class="form-control border-0 bg-white shadow-none" placeholder="Buscar médico por nombre..." autocomplete="off"/>
            </div>
          </div>
          <div class="col-6 col-md-4">
            <select class="form-select rounded-pill" id="filtro-especialidad">
              <option value="">Todas las especialidades</option>
            </select>
          </div>
          <div class="col-6 col-md-3">
            <button class="btn btn-outline-secondary rounded-pill w-100" id="btn-limpiar-filtros">
              <i class="fa-solid fa-xmark me-1"></i> Limpiar
            </button>
          </div>
        </div>

        <div class="table-responsive">
          <table class="table table-borderless align-middle tabla-personalizada m-0">
            <thead class="border-bottom">
              <tr>
                <th>Médico</th>
                <th>Especialidad</th>
                <th>Días</th>
                <th>Horario</th>
                <th>Duración Cita</th>
                <th>Máx. Citas/Día</th>
                <th>Estado</th>
                <th class="text-end">Acciones</th>
              </tr>
            </thead>
            <tbody id="tabla-horarios-body">
              <tr><td colspan="8" class="text-center text-muted py-4">Cargando...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- MODAL VER DISPONIBILIDAD -->
<div class="modal fade" id="modalDisponibilidad" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0 rounded-4 shadow">
      <div class="modal-header border-bottom-0 pt-4 px-4">
        <h5 class="modal-title fw-bold">
          <i class="fa-solid fa-calendar-check me-2 text-primary"></i> Disponibilidad del Médico
        </h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body px-4 pb-4">
        <div class="alert alert-light border rounded-3 p-3 mb-3">
          <div class="d-flex align-items-center gap-3">
            <div class="bg-primary text-white rounded-circle d-flex align-items-center justify-content-center flex-shrink-0 fw-bold"
                 style="width:48px;height:48px;font-size:1rem" id="disp_avatar">--</div>
            <div>
              <p class="fw-bold mb-0" id="disp_nombre">—</p>
              <small class="text-muted" id="disp_especialidad">—</small>
            </div>
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label small fw-bold">Seleccionar Fecha</label>
          <input type="date" class="form-control rounded-3" id="disp_fecha"/>
        </div>
        <div id="disp_slots_wrapper" class="d-none">
          <label class="form-label small fw-bold">Horarios Disponibles</label>
          <div id="disp_slots" class="d-flex flex-wrap gap-2"></div>
        </div>
        <div id="disp_sin_slots" class="d-none">
          <p class="text-muted text-center py-2">No hay horarios disponibles para esta fecha.</p>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../../js/funciones.js"></script>
<script src="../../js/app.recepcion.js"></script>
</body>
</html>
