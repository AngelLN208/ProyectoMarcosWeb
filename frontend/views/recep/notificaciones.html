<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Aviva — Notificaciones</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏥</text></svg>">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <link rel="stylesheet" href="../../css/stilos.css"/>
</head>
<body data-tema="claro">
<div id="wrapper">

  <!-- SIDEBAR generado por funciones.js -->
  <aside class="sidebar shadow-sm" id="sidebar-wrapper"></aside>

  <main id="page-content-wrapper" class="fondo-claro-personalizado">

    <!-- NAVBAR generado por funciones.js -->
    <div id="navbar-wrapper"></div>

    <div class="container-fluid px-4 pb-4">
      <div class="panel-titulo d-flex align-items-center gap-2 mb-4 mt-2">
        <i class="fa-solid fa-bell texto-primario-personalizado fa-lg"></i>
        <h4 class="fw-bold mb-0">Centro de Notificaciones</h4>
      </div>

      <!-- KPIs deshabilitados -->
      <div class="grid-estadisticas mb-4">
        <div class="card tarjeta-estadistica border-0 rounded-4 p-3 shadow-sm opacity-50">
          <div class="card-body">
            <div class="d-flex justify-content-between align-items-center mb-2">
              <h6 class="text-muted mb-0"><i class="fa-solid fa-bell me-2"></i> Sin Leer</h6>
              <span class="badge bg-secondary rounded-pill px-2 py-1">Próximamente</span>
            </div>
            <h2 class="fw-bold mb-0 text-muted">—</h2>
            <small class="text-muted">Requieren atención</small>
          </div>
        </div>
        <div class="card tarjeta-estadistica border-0 rounded-4 p-3 shadow-sm opacity-50">
          <div class="card-body">
            <div class="d-flex justify-content-between align-items-center mb-2">
              <h6 class="text-muted mb-0"><i class="fa-solid fa-check-double me-2"></i> Leídas</h6>
              <span class="badge bg-secondary rounded-pill px-2 py-1">Próximamente</span>
            </div>
            <h2 class="fw-bold mb-0 text-muted">—</h2>
            <small class="text-muted">Ya revisadas</small>
          </div>
        </div>
        <div class="card tarjeta-estadistica border-0 rounded-4 p-3 shadow-sm">
          <div class="card-body">
            <div class="d-flex justify-content-between align-items-center mb-2">
              <h6 class="text-muted mb-0"><i class="fa-solid fa-list me-2"></i> Total</h6>
              <span class="badge fondo-info-sutil texto-info rounded-pill px-2 py-1">Registro</span>
            </div>
            <h2 class="fw-bold mb-0" id="stat-total-notif">—</h2>
            <small class="text-muted">En el sistema</small>
          </div>
        </div>
      </div>

      <!-- TABLA -->
      <div class="card border-0 rounded-4 shadow-sm p-4">
        <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
          <h5 class="fw-bold mb-0">Notificaciones</h5>
        </div>

        <!-- FILTROS -->
        <div class="row g-2 mb-3">
          <div class="col-12 col-md-4">
            <select class="form-select rounded-pill" id="filtro-tipo">
              <option value="">Todos los tipos</option>
              <option value="APPOINTMENT_CREATED">Cita creada</option>
              <option value="APPOINTMENT_RESCHEDULED">Cita reprogramada</option>
              <option value="APPOINTMENT_CANCELLED">Cita cancelada</option>
              <option value="APPOINTMENT_REMINDER">Recordatorio de cita</option>
              <option value="APPOINTMENT_CONFIRMED">Cita confirmada</option>
              <option value="PAYMENT_RECEIVED">Pago recibido</option>
              <option value="PAYMENT_FAILED">Fallo en pago</option>
              <option value="TREATMENT_PLAN">Plan de tratamiento</option>
            </select>
          </div>
          <div class="col-6 col-md-3">
            <select class="form-select rounded-pill" id="filtro-canal">
              <option value="">Todos los canales</option>
              <option value="EMAIL">Email</option>
              <option value="SMS">SMS</option>
              <option value="IN_APP">In-App</option>
            </select>
          </div>
          <div class="col-6 col-md-3">
            <select class="form-select rounded-pill" id="filtro-estado">
              <option value="">Todos los estados</option>
              <option value="PENDING">Pendiente</option>
              <option value="SENT">Enviada</option>
              <option value="DELIVERED">Entregada</option>
              <option value="FAILED">Fallida</option>
            </select>
          </div>
          <div class="col-12 col-md-2">
            <button class="btn btn-outline-secondary rounded-pill w-100" id="btn-limpiar-filtros">
              <i class="fa-solid fa-xmark me-1"></i> Limpiar
            </button>
          </div>
        </div>

        <div class="table-responsive">
          <table class="table table-borderless align-middle tabla-personalizada m-0">
            <thead class="border-bottom">
              <tr>
                <th>Tipo</th>
                <th>Destinatario</th>
                <th>Asunto</th>
                <th>Canal</th>
                <th>Estado</th>
                <th>Fecha</th>
              </tr>
            </thead>
            <tbody id="tabla-notificaciones-body">
              <tr><td colspan="6" class="text-center text-muted py-4">Cargando...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../../js/funciones.js"></script>
<script src="../../js/app.recepcion.js"></script>
</body>
</html>
