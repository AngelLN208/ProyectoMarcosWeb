<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Pagos - Clínica Aviva</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../css/styles_admin.css">

    <script defer src="../../js/app_admin.js"></script>
</head>

<body>

    <div class="d-flex">

        <!-- SIDEBAR -->
        <div class="sidebar">
            <h4>🏥 Aviva</h4>

            <a href="dashboard.html">Dashboard</a>
            <a href="pacientes.html">Pacientes</a>
            <a href="doctores.html">Doctores</a>
            <a href="especialidades.html">Especialidades</a>
            <a href="pagos.html">Pagos</a>
            <a href="#" onclick="logout()" class="text-danger mt-3">
                🚪 Cerrar sesión
            </a>
        </div>
        <!-- CONTENIDO -->
        <div class="content p-4">

            <h2>Gestión de Pagos</h2>

            <!-- BUSCADOR -->
            <input id="buscarPago" class="form-control mb-3" placeholder="Buscar por ID de boleta o paciente">

            <!-- BOTÓN -->
            <button class="btn btn-primary mb-3" onclick="nuevaBoleta()">
                💳 Nueva Boleta
            </button>

            <!-- TABLA -->
            <div class="card shadow p-3">
                <table class="table table-hover align-middle" id="tablaPagos">

                    <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>Paciente</th>
                            <th>Monto</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>

                    <tbody>

                        <tr>
                            <td>#001</td>
                            <td>Juan Pérez</td>
                            <td>S/ 80</td>
                            <td><span class="badge bg-success">Pagado</span></td>
                            <td>
                                <button class="btn btn-info btn-sm"
                                    onclick="verBoleta('#001','Juan Pérez','S/ 80','Pagado')">
                                    Ver
                                </button>

                                <button class="btn btn-warning btn-sm" onclick="editarPago('#001')">
                                    Editar
                                </button>
                            </td>
                        </tr>

                        <tr>
                            <td>#002</td>
                            <td>María Gómez</td>
                            <td>S/ 60</td>
                            <td><span class="badge bg-warning">Pendiente</span></td>
                            <td>
                                <button class="btn btn-info btn-sm"
                                    onclick="verBoleta('#002','María Gómez','S/ 60','Pendiente')">
                                    Ver
                                </button>

                                <button class="btn btn-warning btn-sm" onclick="editarPago('#002')">
                                    Editar
                                </button>
                            </td>
                        </tr>

                        <tr>
                            <td>#003</td>
                            <td>Carlos Ruiz</td>
                            <td>S/ 50</td>
                            <td><span class="badge bg-danger">Cancelado</span></td>
                            <td>
                                <button class="btn btn-info btn-sm"
                                    onclick="verBoleta('#003','Carlos Ruiz','S/ 50','Cancelado')">
                                    Ver
                                </button>

                                <button class="btn btn-warning btn-sm" onclick="editarPago('#003')">
                                    Editar
                                </button>
                            </td>
                        </tr>

                    </tbody>

                </table>
            </div>

        </div>
    </div>

</body>

</html>
