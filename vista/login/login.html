<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Login - Clínica Aviva</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="../../css/style_login.css">

<script defer src="../../js/app.login.js"></script>
<script defer src="../../js/app_admin.js"></script>
</head>

<body>

<div class="login-box">

<h3 class="text-center mb-3">🏥 Aviva Login</h3>

<input id="usuario" class="form-control mb-3" placeholder="Usuario">
<input id="password" type="password" class="form-control mb-3" placeholder="Contraseña">

<button class="btn btn-primary w-100" onclick="login()">
Ingresar
</button>

<p id="error" class="text-danger mt-2"></p>

</div>

</body>
</html>
