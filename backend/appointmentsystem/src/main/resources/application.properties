spring.application.name=appointmentsystem

# ========================================
# DATABASE CONFIGURATION
# ========================================
# PostgreSQL con variables de entorno (similar a tu proyecto finanzas-backend)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/clinica_aviva}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Alternativa: Usar H2 para desarrollo sin PostgreSQL (comentar líneas anteriores)
#spring.datasource.url=jdbc:h2:mem:clinicaaviva
#spring.datasource.username=sa
#spring.datasource.password=
#spring.datasource.driver-class-name=org.h2.Driver
#spring.h2.console.enabled=true
#spring.jpa.hibernate.ddl-auto=create
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# ========================================
# JWT CONFIGURATION
# ========================================
jwt.secret=clave_secreta_aviva_2024_muy_larga_para_seguridad_profesional_123456789
jwt.expiration=86400000

# ========================================
# LOGGING CONFIGURATION
# ========================================
logging.level.root=INFO
logging.level.com.aviva.appointmentsystem=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n
logging.file.name=/home/restring/IdeaProjects/AvivaManagementSystem/backend/appointmentsystem/spring.log

# ========================================
# SERVER CONFIGURATION
# ========================================
server.port=8080
server.servlet.context-path=/
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false

# ========================================
# JACKSON CONFIGURATION
# ========================================
spring.jackson.property-naming-strategy=SNAKE_CASE
