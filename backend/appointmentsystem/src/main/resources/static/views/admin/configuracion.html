<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Configuración - Clínica Aviva</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../css/Estilos.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <script defer src="../../js/app_admin.js"></script>
  </head>

  <body>
    <div class="d-flex">
      <div class="sidebar text-white">
        <div class="logo-container">
          <h2>AVIVA</h2>
          <small>CLINIC</small>
        </div>

        <ul class="nav flex-column mt-4">
          <li>
            <a href="dashboard.html" class="nav-link">
              <i class="bi bi-grid"></i>
              Dashboard
            </a>
          </li>
          <li>
            <a href="pacientes.html" class="nav-link">
              <i class="bi bi-person"></i>
              Pacientes
            </a>
          </li>
          <li>
            <a href="doctores.html" class="nav-link">
              <i class="bi bi-heart-pulse"></i>
              Doctores
            </a>
          </li>
          <li>
            <a href="especialidades.html" class="nav-link">
              <i class="bi bi-hospital"></i>
              Especialidades
            </a>
          </li>
          <li>
            <a href="pagos.html" class="nav-link">
              <i class="bi bi-credit-card"></i>
              Pagos
            </a>
          </li>
          <li>
            <a href="configuracion.html" class="nav-link active-menu">
              <i class="bi bi-gear"></i>
              Configuración
            </a>
          </li>
          <li>
            <a href="#" onclick="logout()" class="nav-link text-danger mt-3">
              <i class="bi bi-box-arrow-right"></i>
              Cerrar sesión
            </a>
          </li>
        </ul>
      </div>

      <div class="content w-100">
        <nav class="navbar bg-white shadow-sm px-4 d-flex justify-content-between">
          <div>
            <h5 class="m-0 fw-semibold">Configuración del Sistema</h5>
            <small class="text-muted">Administración global y personalización</small>
          </div>
          <div class="d-flex align-items-center gap-3">
            <button class="btn btn-light position-relative shadow-sm">
              <i class="bi bi-bell"></i>
              <span class="badge bg-danger position-absolute top-0 start-100 translate-middle">2</span>
            </button>
            <div class="user-avatar">A</div>
          </div>
        </nav>

        <div class="container-fluid p-4">
          <div id="notificationBanner" class="notification-banner" aria-live="polite"></div>

          <div class="row g-4">
            <!-- Tema -->
            <div class="col-lg-6">
              <div class="dashboard-card">
                <h5 class="fw-bold mb-4">Tema de la Interfaz</h5>
                <div class="d-flex gap-3">
                  <button id="themeLight" class="btn btn-outline-primary">Tema Claro</button>
                  <button id="themeDark" class="btn btn-outline-secondary">Tema Oscuro</button>
                </div>
              </div>
            </div>

           
            <div class="col-lg-6">
              <div class="dashboard-card">
                <h5 class="fw-bold mb-4">Horarios de Clínica</h5>
                <div class="row g-3">
                  <div class="col-md-6">
                    <label class="form-label">Hora de Apertura</label>
                    <input type="time" id="horaApertura" class="form-control" value="08:00">
                  </div>
                  <div class="col-md-6">
                    <label class="form-label">Hora de Cierre</label>
                    <input type="time" id="horaCierre" class="form-control" value="18:00">
                  </div>
                </div>
                <button class="btn btn-primary mt-3" onclick="guardarHorarios()">Guardar Horarios</button>
              </div>
            </div>
            
            <div class="col-lg-12">
              <div class="dashboard-card">
                <h5 class="fw-bold mb-4">Mi Perfil</h5>
                <div class="row align-items-center mb-4">
                  <div class="col-md-2 text-center">
                    <div class="user-avatar" style="width: 100px; height: 100px; font-size: 36px; margin: 0 auto;">A</div>
                    <button class="btn btn-sm btn-outline-primary mt-2" onclick="cambiarFoto()">Cambiar foto</button>
                  </div>
                  <div class="col-md-10">
                    <div class="row g-3">
                      <div class="col-md-6">
                        <label class="form-label">Nombre</label>
                        <input type="text" id="nombrePerfil" class="form-control" value="Administrador" placeholder="Tu nombre">
                      </div>
                      <div class="col-md-6">
                        <label class="form-label">Correo Electrónico</label>
                        <input type="email" id="correoPerfil" class="form-control" value="admin@aviva.com" placeholder="tu@correo.com">
                      </div>
                      <div class="col-md-6">
                        <label class="form-label">Teléfono</label>
                        <input type="tel" id="telefonoPerfil" class="form-control" value="+51 987 654 321" placeholder="+51 ...">
                      </div>
                      <div class="col-md-6">
                        <label class="form-label">Especialidad/Rol</label>
                        <input type="text" id="rolPerfil" class="form-control" value="Administrador" readonly>
                      </div>
                    </div>
                    <button class="btn btn-primary mt-3" onclick="guardarPerfil()">Guardar Cambios</button>
                  </div>
                </div>
              </div>
            </div>

            <!-- Seguridad -->
            <div class="col-lg-12">
              <div class="dashboard-card">
                <h5 class="fw-bold mb-4">Seguridad</h5>
                <div class="row g-3">
                  <div class="col-md-4">
                    <label class="form-label">Contraseña Actual</label>
                    <input type="password" id="passActual" class="form-control">
                  </div>
                  <div class="col-md-4">
                    <label class="form-label">Nueva Contraseña</label>
                    <input type="password" id="passNueva" class="form-control">
                  </div>
                  <div class="col-md-4">
                    <label class="form-label">Confirmar Contraseña</label>
                    <input type="password" id="passConfirm" class="form-control">
                  </div>
                </div>
                <button class="btn btn-primary mt-3" onclick="cambiarContrasena()">Cambiar Contraseña</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
