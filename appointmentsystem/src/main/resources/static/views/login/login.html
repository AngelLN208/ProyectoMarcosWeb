<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Login - Clínica Aviva</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="../../css/style_login.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="container-fluid vh-100">
<div class="row h-100">

   
    <div class="col-lg-7 d-none d-lg-flex left-panel">

        <div class="overlay-content">

            <div class="logo-box">
                <h1>AVIVA+</h1>
                <p>Plataforma Empresarial</p>
            </div>

            <div class="image-area">
                <img src="https://cloudfront-us-east-1.images.arcpublishing.com/elcomercio/3FV7XNCCHBGM3JIEEPO333JI7U.jpeg" alt="Trabajador">
            </div>

            <div class="info-cards">

                <div class="info-card">
                    <i class="bi bi-people-fill"></i>
                    <span>Gestión de trabajadores</span>
                </div>

                <div class="info-card">
                    <i class="bi bi-bar-chart-fill"></i>
                    <span>Control administrativo</span>
                </div>

            </div>

            <div class="bottom-text">
                Gestion de Funciones, accesos y reportes
                desde una sola plataforma.
            </div>

        </div>

    </div>

    <div class="col-lg-5 col-12 right-panel">

        <div class="login-container">

            <div class="login-form">

                <h2>Iniciar sesión</h2>

                <div class="mb-3">
                    <label class="form-label">Usuario</label>
                    <input
                        id="usuario"
                        type="text"
                        class="form-control custom-input"
                        placeholder="Ingresa tu usuario">
                </div>

                <div class="mb-4">
                    <label class="form-label">Contraseña</label>
                    <input
                        id="password"
                        type="password"
                        class="form-control custom-input"
                        placeholder="Ingresa tu contraseña">
                </div>

                <div class="mb-3">
                    <a href="#" class="forgot-link">
                        Olvidé mi contraseña
                    </a>
                </div>

                <button
                    class="btn login-btn w-100"
                    onclick="login()">
                    Ingresar
                </button>

                <p id="error" class="text-danger mt-3 text-center"></p>

            </div>

        </div>

    </div>

</div>
</div>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
<script src="/js/app.login.js"></script>
</body>
</html>
